name: ECS Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - dev
          - master

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    if: ${{ github.event.inputs.environment == 'dev' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - name: pit-rave-app
            service: rave2-sandbox-app
          - name: pit-rave-rest
            service: rave2-sandbox-rest
          - name: pit-rave-notifier
            service: rave2-sandbox-notifier
          - name: pit-rave-orchestrator
            service: rave2-sandbox-orchestrator
    
    env:
      AWS_ACCOUNT_ID:    ${{ secrets.AWS_ACCOUNT_ID_DEV }}
      AWS_REGION:        ${{ secrets.AWS_REGION_DEV }}
      ROLE_ARN:          ${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}
      ROLE_SESS:         ${{ secrets.AWS_ROLE_SESSION_NAME_DEV }}
      ECS_CLUSTER:       ${{ secrets.ECS_CLUSTER_DEV }}
      ECR_REGISTRY:      ${{ secrets.AWS_ACCOUNT_ID_DEV }}.dkr.ecr.${{ secrets.AWS_REGION_DEV }}.amazonaws.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ env.ROLE_ARN }}
          role-session-name: ${{ env.ROLE_SESS }}
          aws-region:        ${{ env.AWS_REGION }}

      - name: Login, Build & Push
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/${{ matrix.app.name }}:latest
          echo "Logging in to ECR"
          aws ecr get-login-password \
            | docker login --username AWS --password-stdin ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          echo "Building and pushing image to ECR"
          cd ${{ matrix.app.name }}
          docker buildx build \
          --no-cache \
          --provenance=false \
          --build-context schemas=../pit-rave-schemas \
          --push \
          -t $IMAGE \
          .
          echo "Image pushed to ECR"

      - name: Force ECS deployment
        run: |
          set -euo pipefail

          CLUSTER="${{ env.ECS_CLUSTER }}"
          SERVICE="${{ matrix.app.service }}"
          REGION="${{ env.AWS_REGION }}"

          echo "Forcing new deployment for $SERVICE"
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --force-new-deployment \
            --region "$REGION" \
            --no-cli-pager \
            --output text >/dev/null

          echo "ECS deployment triggered for cluster: $CLUSTER, service: $SERVICE"
          echo "Waiting for ECS service to become stable..."

          if aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --region "$REGION"; then

            echo "Deployment completed successfully for $SERVICE"
          else
            echo "Service failed to become stable: $SERVICE"
            echo "=== Service events (latest 20) ==="
            aws ecs describe-services \
              --cluster "$CLUSTER" \
              --services "$SERVICE" \
              --region "$REGION" \
              --query 'services[0].events[0:20].[createdAt,message]' \
              --output table || true
            exit 1
          fi

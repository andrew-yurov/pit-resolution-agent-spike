name: Application Build

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master", "dev" ]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - pit-rave-app
          - pit-rave-rest
          - pit-rave-notifier
          - pit-rave-orchestrator
          - pit-rave-schemas

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: ${{ matrix.app }}/yarn.lock

      - name: Install pit-rave-schemas dependencies
        working-directory: pit-rave-schemas
        run: yarn install --frozen-lockfile

      - name: Install
        working-directory: ${{ matrix.app }}
        run: yarn install --frozen-lockfile

    #   - name: Run tests (if defined)
    #     working-directory: ${{ matrix.app }}
    #     run: |
    #         if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts['test:all'] ? 0 : 1)"; then
    #             yarn test:all
    #         else
    #             echo "No test:all script in ${{ matrix.app }}, skipping."
    #         fi
        
      - name: Build
        working-directory: ${{ matrix.app }}
        run: yarn build
